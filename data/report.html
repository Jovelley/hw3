<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Отчёт</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; max-width: 900px; margin: auto; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 2rem; }
    th, td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; }
    th { background: #f0f0f0; }
    h1 { color: #333; }
    h2 { color: #555; margin-top: 2rem; }
  </style>
</head>
<body>
  <h1>Отчёт по данным</h1>
  <p>Всего строк: <strong>50</strong></p>
  
  <h2>Числовые колонки</h2>
  <table>
    <thead>
      <tr><th>Колонка</th><th>Кол-во</th><th>Min</th><th>Max</th><th>Среднее</th></tr>
    </thead>
    <tbody>
  <tr>
    <td>Price</td>
    <td>50</td>
    <td>187.87</td>
    <td>1994.20</td>
    <td>1272.92</td>
  </tr>
  <tr>
    <td>Quantity</td>
    <td>50</td>
    <td>5.00</td>
    <td>98.00</td>
    <td>58.78</td>
  </tr></tbody>
  </table>
  
  <h2>Колонка: Product_name</h2>
  <table>
    <thead><tr><th>Значение</th><th>Кол-во</th></tr></thead>
    <tbody><tr><td>Laptop</td><td>20</td></tr><tr><td>Phone</td><td>18</td></tr><tr><td>Tablet</td><td>12</td></tr></tbody>
  </table>
  <h2>Колонка: In_stock</h2>
  <table>
    <thead><tr><th>Значение</th><th>Кол-во</th></tr></thead>
    <tbody><tr><td>True</td><td>27</td></tr><tr><td>False</td><td>23</td></tr></tbody>
  </table>
</body>
</html>
